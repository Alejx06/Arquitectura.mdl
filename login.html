<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Papelería</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1abc9c, #2c3e50);
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h2{
            margin-bottom:10px;
            color:#2c3e50;
        }

        .login-box p{
            margin-bottom:25px;
            color:#7f8c8d;
        }

        .input-group{
            text-align:left;
            margin-bottom:20px;
        }

        .input-group label{
            font-size:14px;
            display:block;
            margin-bottom:5px;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#1abc9c;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#1abc9c;
            border:none;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16a085;
            transform:scale(1.03);
        }

    </style>
</head>
<body>

<div class="login-box">
    <h2>Papelería Admin</h2>
    <p>Iniciar sesión</p>

    <form id="loginForm">

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="Ingrese su usuario" required>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Ingrese su contraseña" required>
        </div>

        <button type="submit">Ingresar</button>

    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let usuario = document.getElementById("usuario").value;
    let password = document.getElementById("password").value;

    if(usuario === "admin" && password === "123456"){
        localStorage.setItem("usuarioActivo", usuario);
        window.location.href = "index.html";
    } else {
        alert("Usuario o contraseña incorrectos");
    }
});
</script>

</body>
</html>
